spring.application.name=retailshield-web
# \u041A\u043E\u0434\u0438\u0440\u043E\u0432\u043A\u0430 \u043E\u0442\u0432\u0435\u0442\u043E\u0432 \u0441\u0435\u0440\u0432\u0435\u0440\u0430
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# \u041A\u043E\u0434\u0438\u0440\u043E\u0432\u043A\u0430 \u0448\u0430\u0431\u043B\u043E\u043D\u043E\u0432 Thymeleaf
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html; charset=UTF-8

# \u041A\u043E\u0434\u0438\u0440\u043E\u0432\u043A\u0430 \u0441\u0442\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u0438\u0445 \u0440\u0435\u0441\u0443\u0440\u0441\u043E\u0432 (CSS/JS)
spring.web.resources.chain.cache=false
spring.mandatory-file-encoding=UTF-8

# === Email-\u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 (\u0437\u043D\u0430\u0447\u0435\u043D\u0438\u044F \u0431\u0435\u0440\u0443\u0442\u0441\u044F \u0438\u0437 \u043F\u0435\u0440\u0435\u043C\u0435\u043D\u043D\u044B\u0445 \u043E\u043A\u0440\u0443\u0436\u0435\u043D\u0438\u044F Render) ===
spring.mail.host=${MAIL_HOST:smtp.rambler.ru}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.rambler.ru
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# \u041A\u0443\u0434\u0430 \u043E\u0442\u043F\u0440\u0430\u0432\u043B\u044F\u0442\u044C \u043E\u0442\u0447\u0451\u0442\u044B (email \u043F\u043E\u043B\u0443\u0447\u0430\u0442\u0435\u043B\u044F). \u0422\u043E\u0436\u0435 \u0438\u0437 \u043F\u0435\u0440\u0435\u043C\u0435\u043D\u043D\u043E\u0439 \u043E\u043A\u0440\u0443\u0436\u0435\u043D\u0438\u044F.
retailshield.report.recipient=${MAIL_TO:}

# \u0412\u043A\u043B\u044E\u0447\u0430\u0435\u0442/\u0432\u044B\u043A\u043B\u044E\u0447\u0430\u0435\u0442 \u043E\u0442\u043F\u0440\u0430\u0432\u043A\u0443. \u0415\u0441\u043B\u0438 false \u2014 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0435 \u0440\u0430\u0431\u043E\u0442\u0430\u0435\u0442,
# \u043D\u043E \u043F\u0438\u0441\u044C\u043C\u0430 \u043D\u0435 \u043E\u0442\u0441\u044B\u043B\u0430\u044E\u0442\u0441\u044F (\u043F\u043E\u043B\u0435\u0437\u043D\u043E \u043F\u0440\u0438 \u043B\u043E\u043A\u0430\u043B\u044C\u043D\u043E\u0439 \u043E\u0442\u043B\u0430\u0434\u043A\u0435).
retailshield.report.enabled=${MAIL_ENABLED:true}